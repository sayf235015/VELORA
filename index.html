<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELORA.com</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Pacifico&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Montserrat',sans-serif;
    background:#f5f7fa;
}

/* Navbar */
.navbar{
    display:flex;
    justify-content:space-between;
    padding:15px 25px;
    background:#111;
    color:white;
}

.logo{
    font-family:'Pacifico',cursive;
    font-size:22px;
    background:linear-gradient(45deg,#ff4d6d,#6a11cb);
    -webkit-background-clip:text;
    color:transparent;
}

.search{
    padding:8px;
    border:none;
    border-radius:5px;
}

/* Hero */
.hero{
    height:250px;
    background:url('https://images.unsplash.com/photo-1555529669-e69e7aa0ba9a') center/cover;
}

/* Products */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:30px;
}

.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.4s;
    animation:fadeIn 1s;
}

.card:hover{
    transform:translateY(-10px) scale(1.03);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card-content{
    padding:10px;
}

.price{
    color:#e67e22;
    font-weight:bold;
}

.btn{
    display:block;
    text-align:center;
    padding:8px;
    margin-top:10px;
    background:linear-gradient(45deg,#ff4d6d,#6a11cb);
    color:white;
    text-decoration:none;
    border-radius:5px;
    cursor:pointer;
}

/* Animation */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <div class="logo">VELORA</div>
    <input class="search" placeholder="Search..." onkeyup="searchProduct(this.value)">
</div>

<!-- Hero -->
<div class="hero"></div>

<!-- Products -->
<div class="products" id="productList">

<!-- Product -->
<div class="card" data-name="Shirts">
<img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f">
<div class="card-content">
<h4>Luxury Watch 🔥</h4>
<p>Premium stylish watch</p>
<div class="price">৳1500</div>
<a class="btn" onclick="order('Luxury Watch',1500)">Order</a>
</div>
</div>

<div class="card" data-name="headphone">
<img src="https://images.unsplash.com/photo-1518449031667-3caa1c87b63b">
<div class="card-content">
<h4>Headphone 🎧</h4>
<p>High quality sound</p>
<div class="price">৳1200</div>
<a class="btn" onclick="order('Headphone',1200)">Order</a>
</div>
</div>

<div class="card" data-name="shoe">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
<div class="card-content">
<h4>Running Shoe 👟</h4>
<p>Comfortable & stylish</p>
<div class="price">৳3000</div>
<a class="btn" onclick="order('Running Shoe',3000)">Order</a>
</div>
</div>

<div class="card" data-name="tshirt">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
<div class="card-content">
<h4>Cool T-Shirt 👕</h4>
<p>Trendy fashion wear</p>
<div class="price">৳800</div>
<a class="btn" onclick="order('T-Shirt',800)">Order</a>
</div>
</div>

</div>

<script>

/* WhatsApp Order */
function order(name,price){
    let msg = `I want to order ${name} (৳${price})`;
    window.open(`https://wa.me/8801952288878?text=${encodeURIComponent(msg)}`);
}

/* Search */
function searchProduct(value){
    let cards=document.querySelectorAll(".card");
    cards.forEach(card=>{
        let name=card.getAttribute("data-name");
        if(name.includes(value.toLowerCase())){
            card.style.display="block";
        }else{
            card.style.display="none";
        }
    });
}

</script>

</body>
</html>
